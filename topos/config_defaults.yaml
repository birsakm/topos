# Built-in defaults for Topos. Do not edit this file for local config —
# override via ~/.config/topos/config.yaml, ./topos.config.yaml, or
# TOPOS__SECTION__KEY=... env vars.

backends:
  default: claude
  claude:
    auth: subscription           # or "api_key" (then env ANTHROPIC_API_KEY is required)
    cli: claude
    model: "claude-opus-4-7[1m]" # pin to Opus 4.7 with 1M context for stability;
                                  # set to null to use the claude CLI's own default
    extra_args: []
    timeout_s: 600
    # Quota / rate-limit resilience. ``exit_reason="quota"`` covers both
    # paid-API quota and subscription rate limits (Claude Pro/Max).
    #   max_quota_retries — N retries after first quota hit (default 3 → 4 attempts)
    #   quota_retry_wait_s — initial backoff seconds; doubles per retry
    #   rate_per_minute — optional token-bucket cap on calls/min. ``null``
    #                     disables (high-throughput Max accounts); set to ~6
    #                     for Pro to stay under ~50 msg / 5h rolling window.
    max_quota_retries: 3
    quota_retry_wait_s: 60.0
    rate_per_minute: null
    # Watchdog. ``timeout_s`` becomes the SOFT deadline (expected completion).
    # Past it, the framework only kills if neither activity signal moved for
    # ``watchdog_idle_grace_s``:
    #   - a new stream-json "real work" event (``"type":"assistant"`` or
    #     ``"type":"user"``) appeared in stdout — heartbeats like
    #     ``rate_limit_event`` are excluded on purpose so a CLI emitting
    #     only quota pings correctly idle-trips
    #   - any workspace file's mtime ticked (covers buffered fallback)
    # Lets a complex fix task (21-part assembly refactor takes 15-25 min)
    # keep running when it's actively turning or editing, but catches a
    # stuck agent. ``watchdog_hard_max_s`` is an absolute ceiling regardless
    # of activity — last-resort safety so a runaway can't burn the whole
    # subscription window.
    watchdog_idle_grace_s: 300
    watchdog_hard_max_s: 3600
  # Codex CLI backend (OpenAI). Calibrated against codex-cli 0.128.0.
  # Spawns `codex exec <PROMPT>` — subcommand-style headless mode.
  # Auth: OPENAI_API_KEY env var when auth=api_key, or run `codex login`
  # and switch to auth=subscription.
  codex:
    auth: api_key
    cli: codex
    model: null                  # e.g. "gpt-5"; null = codex's own default
    sandbox: workspace-write     # read-only | workspace-write | danger-full-access
    bypass_approvals: true       # framework owns the workspace; full auto
    config_overrides: []         # passed as -c key=value (TOML), e.g. ["model_reasoning_effort=medium"]
    extra_args: []
    timeout_s: 600
  # Gemini CLI backend (Google). Calibrated against gemini-cli 0.41.2.
  # Spawns `gemini -p <PROMPT> --approval-mode yolo -o json`.
  # Auth: GOOGLE_API_KEY or GEMINI_API_KEY env var when auth=api_key.
  gemini:
    auth: api_key
    cli: gemini
    model: null                  # e.g. "gemini-3-pro"; null = gemini's own default
    approval_mode: yolo          # default | auto_edit | yolo | plan
    sandbox: false
    include_directories: []      # extra dirs to expose, comma-separated
    extra_args: []
    timeout_s: 600

blender:
  binary: null                   # must be set; `topos doctor` will help auto-detect
  hot_pool:
    enabled: false               # default off; opt in per-project
    max_procs: 2
    idle_kill_s: 600

visual_critic:
  # Global one-knob override. When set, EVERY rubric is critiqued by this
  # backend, ignoring the rubric YAML's own ``judge_backend:`` field.
  # Useful to flip the whole pipeline to a cheaper / non-Claude model
  # without editing per-rubric files. Set via:
  #   topos config set visual_critic.default gemini_vision
  # Unset (null) = honor each rubric's own setting.
  default: null
  # Per-backend tuning. Each backend handles transient errors (HTTP 429
  # rate limit + 5xx) with exponential-backoff retry.
  openai_vision:
    # Auth: OPENAI_API_KEY env var preferred. Fall back to api_key set here
    # (via `topos config set visual_critic.openai_vision.api_key <key>`).
    api_key: null
    model: gpt-5             # vision-capable flagship; override per-rubric in extras
    timeout_s: 180
    max_retries: 3           # retries on 429 / 5xx — gives total 4 attempts
    retry_base_wait_s: 30.0  # doubles per retry → 30/60/120 = ~3.5min ceiling
  gemini_vision:
    # Auth: GEMINI_API_KEY env var preferred. Fall back: this section's
    # api_key, then image_gen.gemini.api_key (Google keys aren't
    # feature-scoped, so reuse is safe). Set via:
    #   topos config set visual_critic.gemini_vision.api_key <key>
    # Get a key at https://aistudio.google.com/app/apikey.
    api_key: null
    model: gemini-3-flash-preview    # default: cheaper flash; gemini-3-pro-preview for higher quality (verified 2026-05-11)
    timeout_s: 180
    max_retries: 3
    retry_base_wait_s: 30.0
    # Google Search grounding — when true, the model MAY (model's own
    # call) issue searches before scoring, e.g. to look up what a
    # "PW1100G turbofan cutaway" actually looks like rather than guessing
    # from training prior. The model self-decides whether to search per
    # call, so cost only kicks in when grounding is warranted (~$0.035
    # per grounded call). Mutually exclusive with structured JSON output
    # at the API level; prompt asks for JSON-only and parser tolerates
    # fences. Default OFF — opt in per project.
    use_google_search: false

bpy_docs:
  # Where the local bpy docs index lives. Built by `topos bpy-docs index`.
  index_path: ~/.config/topos/bpy_docs.json

image_gen:
  default: gemini
  gemini:
    # Set via: topos config set image_gen.gemini.api_key <key>
    # OR via env: TOPOS__IMAGE_GEN__GEMINI__API_KEY=...
    # Get a key at https://aistudio.google.com/app/apikey
    api_key: null
    # Image-gen model. Verified available 2026-05-11:
    #   gemini-3.1-flash-image-preview  — "Nano Banana 2" (default; flash tier)
    #   gemini-3-pro-image-preview      — "Nano Banana Pro" (higher quality, slower/pricier)
    #   gemini-2.5-flash-image          — original "Nano Banana" (GA, older)
    model: gemini-3.1-flash-image-preview
    timeout_s: 180   # Nano Banana 2 can take 60-120s per image; allow headroom
    # Server-side variance on the preview model is large (observed 18s–180s+
    # in a single session). Without retry we saw ~1/5 requests time out.
    # 2 retries with backoff (5s → 10s) drives the failure rate to near zero;
    # retried attempts are queue waits, not billed image generations.
    max_retries: 2
    retry_base_wait_s: 5.0

# Trajectory analysis (`topos analyze`) — a text-LLM synthesis step that is
# provider-agnostic; nothing here is Gemini-locked.
analysis:
  # Provider: gemini | openai | anthropic. Set via:
  #   topos config set analysis.backend openai
  backend: gemini
  # Model override; null = the chosen backend's default
  # (gemini-3-flash-preview / gpt-5 / claude-sonnet-4-6).
  model: null
  # API keys are reused from the matching provider where possible
  #   gemini    → GEMINI_API_KEY / visual_critic.gemini_vision.api_key / image_gen.gemini.api_key
  #   openai    → OPENAI_API_KEY / visual_critic.openai_vision.api_key
  #   anthropic → ANTHROPIC_API_KEY / analysis.anthropic.api_key
  anthropic:
    api_key: null

orchestrator:
  max_parallel_tasks: 4
