id: rigid_object_v1
description: |
  Baseline rubric for a single rigid 3D object rendered from one or more
  viewpoints. Used by Stage 0 (smoke) and Stage 1 (rigid).
judge_backend: claude_vision
pass_threshold: 0.6
criteria:
  - id: contains_object
    weight: 0.4
    prompt: >
      Does the image clearly contain a recognizable 3D object (not a blank or
      noise-only frame)? A simple primitive like a cube counts as success at
      Stage 0; for richer Stage 1 prompts the object should resemble what the
      spec described.
  - id: visible_geometry
    weight: 0.3
    prompt: >
      Is the object's geometry clearly visible (not severely clipped, not
      degenerate, not entirely off-screen, not hidden behind another object)?
  - id: lighting_reasonable
    weight: 0.2
    prompt: >
      Is lighting reasonable enough to see the object? Pure-black or
      pure-white frames fail. The default Blender lighting is acceptable.
  - id: no_obvious_errors
    weight: 0.1
    prompt: >
      Are there obvious render errors — purple missing-texture material,
      visible NaN polygons, flickering, missing camera framing — that would
      fail a human pass?
