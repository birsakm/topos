id: rigid_chair_simple
domain: rigid
description: |
  Simplest Stage-1 rigid object: a recognizable wooden 4-leg dining chair
  with seat + backrest, procedurally constructed from bpy primitives in a
  single src/build.py. No bmesh, no third-party packages, deterministic
  workbench render.

  Goal of this example is to exercise the full pipeline on something more
  semantically meaningful than a cube — the agent has to compose multiple
  primitives at correct relative positions, and the vision judge has to
  recognize the result as a chair (not just "some 3D object").
